name: Publish Weather Data to MQTT

# Trigger: schedulato + manuale
on:
  # Schedule: ogni 15 minuti
  schedule:
    - cron: '*/16 * * * *'
      
  
  # Permetti esecuzione manuale dal tab "Actions"
  workflow_dispatch:

# Job che esegue lo script
jobs:
  publish-meteo:
    name: Fetch meteo Dairago and publish to HiveMQ
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: scarica il codice del repository
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Step 2: configura Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # Step 3: installa la libreria MQTT
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install paho-mqtt
      
      # Step 4: esegui lo script
      - name: Run weather publisher
        env:
          HIVEMQ_PASSWORD: ${{ secrets.HIVEMQ_PASSWORD }}
        run: python weather_publisher.py
